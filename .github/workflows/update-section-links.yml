name: Auto Updating Section Links

on:
  schedule:
    # UTC 20:00 Sunday = Asia/Taipei 04:00 Monday
    - cron: "0 20 * * 0"
  workflow_dispatch:

jobs:
  fetch_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r script/requirements.txt

      - name: Run Script
        env:
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
        run: python script/fetch_section_links.py

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: section-links-data
          path: artifacts/
          retention-days: 7

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/

          if ! git diff --staged --quiet public/; then
            git commit -m "Auto-update section links"
            git push
          else
            echo "No changes to commit."
          fi
