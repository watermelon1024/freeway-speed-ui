name: Auto Updating Section Links

on:
  schedule:
    # UTC 20:00 Sunday = Asia/Taipei 04:00 Monday
    - cron: "0 20 * * 0"
  workflow_dispatch:

jobs:
  fetch_and_push:
    name: Fetch Section Links and Push to Repo
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -r script/requirements.txt

      - name: Run Script
        env:
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
        run: python script/fetch_section_links.py

      - name: Upload debug artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: section-links-data
          path: artifacts/
          retention-days: 7

      - name: Commit and Push changes
        id: commit_and_push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add public/

          if ! git diff --staged --quiet public/; then
            git commit -m "Auto-update section links"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "No changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Dispatch Build Workflow
        if: steps.commit_and_push.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run docker-build.yml
